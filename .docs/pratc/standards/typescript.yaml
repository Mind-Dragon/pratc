# TypeScript Standards - prATC Web Dashboard
# Version: 1.0
# Last Updated: 2026-04-01
# Stack: Next.js 15 + React 19 + Bun

metadata:
  name: TypeScript Standards
  version: "1.0"
  last_updated: "2026-04-01"
  stack: "Next.js 15 + React 19 + Bun"
  location: web/src/types/api.ts

overview: |
  This specification defines TypeScript types, interfaces, and coding conventions for the prATC web dashboard.
  All types maintain consistency with Go (internal/types/models.go) and Python (ml-service/src/pratc_ml/models.py) counterparts.

type_consistency_contract:
  core_principle: |
    Go, Python, and TypeScript share identical type definitions with snake_case JSON keys.
  
  language_mapping:
    - language: Go
      location: internal/types/models.go
      pattern: struct with json:"snake_case" tags
    - language: Python
      location: ml-service/src/pratc_ml/models.py
      pattern: Pydantic BaseModel with snake_case fields
    - language: TypeScript
      location: web/src/types/api.ts
      pattern: interface with snake_case keys

  naming_convention:
    json_keys: snake_case
    json_keys_example: [pr_number, created_at]
    typescript_interfaces: PascalCase
    typescript_interfaces_example: [PR, MergePlanCandidate]
    typescript_types: PascalCase
    typescript_types_example: [SettingsMap, PostSettingOptions]

shared_domain_types:
  core_pr_types:
    PR:
      fields:
        - name: id
          type: string
        - name: repo
          type: string
        - name: number
          type: number
        - name: title
          type: string
        - name: body
          type: string
        - name: url
          type: string
        - name: author
          type: string
        - name: labels
          type: string[]
        - name: files_changed
          type: string[]
        - name: review_status
          type: string
          semantics: [approved, changes_requested, commented, pending]
        - name: ci_status
          type: string
          semantics: [success, failure, pending, unknown]
        - name: mergeable
          type: string
          semantics: [true, false, unknown]
        - name: base_branch
          type: string
        - name: head_branch
          type: string
        - name: cluster_id
          type: string
        - name: created_at
          type: string
        - name: updated_at
          type: string
        - name: is_draft
          type: boolean
        - name: is_bot
          type: boolean
        - name: additions
          type: number
        - name: deletions
          type: number
        - name: changed_files_count
          type: number

    PRCluster:
      fields:
        - name: cluster_id
          type: string
        - name: cluster_label
          type: string
        - name: summary
          type: string
        - name: pr_ids
          type: number[]
        - name: health_status
          type: string
          semantics: [healthy, warning, critical]
        - name: average_similarity
          type: number
          semantics: Range [0.0, 1.0]
        - name: sample_titles
          type: string[]

  analysis_types:
    DuplicateGroup:
      fields:
        - name: canonical_pr_number
          type: number
        - name: duplicate_pr_numbers
          type: number[]
        - name: similarity
          type: number
        - name: reason
          type: string
      thresholds:
        duplicate: similarity > 0.90
        overlapping: similarity 0.70-0.90

    ConflictPair:
      fields:
        - name: source_pr
          type: number
        - name: target_pr
          type: number
        - name: conflict_type
          type: string
          semantics: [file_overlap, semantic_conflict, dependency]
        - name: files_touched
          type: string[]
        - name: severity
          type: string
          semantics: [low, medium, high, critical]
        - name: reason
          type: string

    StalenessReport:
      fields:
        - name: pr_number
          type: number
        - name: score
          type: number
          semantics: Range [0.0, 1.0] (higher = more stale)
        - name: signals
          type: string[]
          examples: [no_commits_7d, behind_main]
        - name: reasons
          type: string[]
        - name: superseded_by
          type: number[]

  planning_types:
    MergePlanCandidate:
      fields:
        - name: pr_number
          type: number
        - name: title
          type: string
        - name: score
          type: number
          semantics: Range [0.0, 100.0]
        - name: rationale
          type: string
        - name: files_touched
          type: string[]
        - name: conflict_warnings
          type: string[]

    MergePlan:
      fields:
        - name: plan_id
          type: string
        - name: mode
          type: string
          semantics: [combination, permutation, with_replacement]
        - name: formula_expression
          type: string
        - name: selected
          type: MergePlanCandidate[]
        - name: ordering
          type: MergePlanCandidate[]
        - name: total_score
          type: number
        - name: warnings
          type: string[]

  graph_types:
    GraphNode:
      fields:
        - name: pr_number
          type: number
        - name: title
          type: string
        - name: cluster_id
          type: string
        - name: ci_status
          type: string

    GraphEdge:
      fields:
        - name: from_pr
          type: number
        - name: to_pr
          type: number
        - name: edge_type
          type: string
          semantics: [depends_on, conflicts_with, supersedes]
        - name: reason
          type: string

  aggregate_types:
    Counts:
      fields:
        - name: total_prs
          type: number
        - name: cluster_count
          type: number
        - name: duplicate_groups
          type: number
        - name: overlap_groups
          type: number
        - name: conflict_pairs
          type: number
        - name: stale_prs
          type: number

    Thresholds:
      fields:
        - name: duplicate
          type: number
          default: 0.90
        - name: overlap
          type: number
          default: 0.70

api_types:
  response_envelope_contract:
    description: All API responses include repo and generatedAt fields
    common_fields:
      - name: repo
        type: string
        description: Repository identifier (owner/repo)
      - name: generatedAt
        type: string
        description: ISO 8601 timestamp

  responses:
    AnalysisResponse:
      fields:
        - name: repo
          type: string
        - name: generatedAt
          type: string
        - name: counts
          type: Counts
        - name: prs
          type: PR[]
        - name: clusters
          type: PRCluster[]
        - name: duplicates
          type: DuplicateGroup[]
        - name: overlaps
          type: DuplicateGroup[]
        - name: conflicts
          type: ConflictPair[]
        - name: stalenessSignals
          type: StalenessReport[]

    ClusterResponse:
      fields:
        - name: repo
          type: string
        - name: generatedAt
          type: string
        - name: model
          type: string
        - name: thresholds
          type: Thresholds
        - name: clusters
          type: PRCluster[]

    DuplicateResponse:
      fields:
        - name: repo
          type: string
        - name: generatedAt
          type: string
        - name: duplicates
          type: DuplicateGroup[]
        - name: overlaps
          type: DuplicateGroup[]

    GraphResponse:
      fields:
        - name: repo
          type: string
        - name: generatedAt
          type: string
        - name: nodes
          type: GraphNode[]
        - name: edges
          type: GraphEdge[]
        - name: dot
          type: string

    PlanResponse:
      fields:
        - name: repo
          type: string
        - name: generatedAt
          type: string
        - name: target
          type: number
        - name: candidatePoolSize
          type: number
        - name: strategy
          type: string
        - name: selected
          type: MergePlanCandidate[]
        - name: ordering
          type: MergePlanCandidate[]
        - name: rejections
          type: PlanRejection[]

    OmniPlanStage:
      fields:
        - name: stage
          type: number
        - name: stageSize
          type: number
        - name: matched
          type: number
        - name: selected
          type: number

    OmniPlanResponse:
      fields:
        - name: repo
          type: string
        - name: generatedAt
          type: string
        - name: selector
          type: string
        - name: mode
          type: string
        - name: stageCount
          type: number
        - name: stages
          type: OmniPlanStage[]
        - name: selected
          type: number[]
        - name: ordering
          type: number[]

  requests:
    ClusterRequest:
      fields:
        - name: repo
          type: string
        - name: prs
          type: PR[]
        - name: model
          type: string
        - name: minClusterSize
          type: number

    DuplicateDetectionRequest:
      fields:
        - name: repo
          type: string
        - name: prs
          type: PR[]
        - name: duplicateThreshold
          type: number
        - name: overlapThreshold
          type: number

    SemanticAnalysisRequest:
      fields:
        - name: repo
          type: string
        - name: prs
          type: PR[]
        - name: analysisMode
          type: string

  utility_types:
    PlanRejection:
      fields:
        - name: pr_number
          type: number
        - name: reason
          type: string

    ActionIntent:
      fields:
        - name: action
          type: string
        - name: pr_number
          type: number
        - name: dry_run
          type: boolean
        - name: created_at
          type: string

    HealthResponse:
      fields:
        - name: status
          type: string
        - name: version
          type: string

frontend_specific_types:
  settings_api:
    location: web/src/lib/api.ts
    
    SettingsMap:
      type: record
      signature: "[key: string]: unknown"

    PostSettingPayload:
      fields:
        - name: scope
          type: global | repo
        - name: repo
          type: string
        - name: key
          type: string
        - name: value
          type: unknown

    PostSettingOptions:
      fields:
        - name: validateOnly
          type: boolean
          optional: true

    PostSettingResponse:
      fields:
        - name: updated
          type: boolean
          optional: true
        - name: valid
          type: boolean
          optional: true

    DeleteSettingResponse:
      fields:
        - name: deleted
          type: boolean

    ImportSettingsResponse:
      fields:
        - name: imported
          type: boolean

  component_props_patterns:
    Layout:
      location: web/src/components/Layout.tsx
      pattern: PropsWithChildren
      fields:
        - name: title
          type: string
        - name: eyebrow
          type: string
        - name: description
          type: string

coding_conventions:
  file_organization:
    types: web/src/types/api.ts
    types_description: All API types in single file
    api_client: web/src/lib/api.ts
    api_client_description: Fetch utilities + API functions
    components: web/src/components/*.tsx
    components_description: Reusable UI components
    pages: web/src/pages/*.tsx
    pages_description: Next.js page routes

  import_patterns:
    type_only: import type { AnalysisResponse, PR } from "../types/api"
    component: import Layout from "./Layout"

  function_signatures:
    api_client:
      pattern: Optional parameters with defaults
      example: "export async function fetchAnalysis(repo: string = DEFAULT_REPO): Promise<AnalysisResponse | null>"
    
    fetch_wrapper:
      pattern: Generic fetch wrapper never throws; returns fallback on error
      signature: "async function fetchJSON<T>(path: string, fallback: T): Promise<T>"

  error_handling:
    - Never throw from API client functions
    - Return null on error (explicit nullable return type)
    - Use Promise<T | null> for all async operations

  nextjs_patterns:
    pages: Use getServerSideProps for data fetching
    dynamic_imports: "Use ssr: false for client-only components"
    app_component: _app.tsx injects global CSS only

  styling:
    file: web/src/styles/globals.css
    pattern: CSS variables in :root for theming
    naming: BEM-like naming convention
    naming_examples: [.stat-card--sky, .cluster-card--red]
    forbidden: [Tailwind, CSS modules, styled-components]

  testing:
    framework: vitest + @testing-library/react
    mock_factories: [createMockPR(), createMockAnalysis()]
    router_mocking: vi.mock("next/router")
    component_mocking: vi.mock("react-force-graph-2d")

type_evolution:
  adding_new_fields:
    - Add to Go internal/types/models.go with json tag
    - Add to Python ml-service/src/pratc_ml/models.py (Pydantic)
    - Add to TypeScript web/src/types/api.ts
    - Update this specification

  breaking_changes:
    - Never remove fields without deprecation cycle
    - New required fields = breaking change (add as optional first)
    - Document all breaking changes in changelog

  type_validation:
    runtime: API boundary (Go side)
    compile_time: TypeScript provides guarantees
    python_runtime: Pydantic validation

cross_language_mapping:
  - go: PR
    python: PR
    typescript: PR
  - go: PRCluster
    python: PRCluster
    typescript: PRCluster
  - go: DuplicateGroup
    python: DuplicateGroup
    typescript: DuplicateGroup
  - go: ConflictPair
    python: ConflictPair
    typescript: ConflictPair
  - go: StalenessReport
    python: StalenessReport
    typescript: StalenessReport
  - go: MergePlanCandidate
    python: MergePlanCandidate
    typescript: MergePlanCandidate
  - go: MergePlan
    python: MergePlan
    typescript: MergePlan
  - go: GraphNode
    python: GraphNode
    typescript: GraphNode
  - go: GraphEdge
    python: GraphEdge
    typescript: GraphEdge
  - go: Counts
    python: Counts
    typescript: Counts
  - go: Thresholds
    python: Thresholds
    typescript: Thresholds
  - go: PlanRejection
    python: PlanRejection
    typescript: PlanRejection
  - go: ActionIntent
    python: ActionIntent
    typescript: ActionIntent

version_history:
  - version: "1.0"
    date: "2026-04-01"
    changes: Initial specification
